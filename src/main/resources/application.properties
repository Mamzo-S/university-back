spring.application.name=universite-backend

# ===============================
# POSTGRESQL
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/universite_db
spring.datasource.username=postgres
spring.datasource.password=Emilie06

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SERVER
# ===============================

server.port=8080

# ===============================
# JWT
# ===============================

jwt.secret=ThisIsAVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256SigningAlgorithmSecurityPurposeOnlyUseInDevelopmentNotProduction123456789
jwt.expiration=86400000

# ===============================
# SWAGGER
# ===============================

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===============================
# LOGGING
# ===============================

logging.level.org.springframework.security=DEBUG

# Upload files
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB